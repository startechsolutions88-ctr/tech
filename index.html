<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Technician Chat</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Welcome Text Container Styles */
        .chat-welcome-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
            max-width: 500px;
            margin: 0 auto;
        }

        .chat-welcome-container h2 {
            color: #0b2265;
            font-size: 24px;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 16px;
        }

        .chat-welcome-container p {
            color: #556080;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .chat-welcome-container .instruction {
            font-weight: 600;
            color: #000000;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <!-- Main Dynamic Interface Section (Centered vertically and horizontally) -->
    <main class="chat-welcome-container">
        <h2>Welcome to Star Tech Solutions<br>Live Chat</h2>
        <p>Ask any question and get answered immediately.</p>
        <p class="instruction">Click the message icon to chat with us.</p>
    </main>

    <!-- Embed Tidio Chat Script Code Interface -->
   <script src="//code.tidio.co/eydu7mnqfvzdlxbpd7nvlvdvn6aooydi.js" async></script>

    <!-- Custom Floating Styles, Sizing, and Window Scale for Tidio -->
    <script>
        function onTidioChatApiReady() {
            // 1. Customize the chat launcher icon (size & bottom placement)
            window.tidioChatApi.adjustStyles('#tidio { bottom: 40px !important; transform: scale(1.25) !important; transform-origin: bottom right !important; }');
            
            // 2. Expand the actual chat conversation window so it is no longer small
            window.tidioChatApi.adjustStyles('#tidio-chat { width: 90vw !important; height: 70vh !important; max-width: 100% !important; max-height: 100% !important; }');
        }

        if (window.tidioChatApi) {
            window.tidioChatApi.on('ready', onTidioChatApiReady);
        } else {
            document.addEventListener("tidioChat-ready", onTidioChatApiReady);
        }
    </script>

</body>
</html>
