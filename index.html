<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Essential for proper scaling and preventing zoom bugs on mobile browsers -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Technician Chat</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden; /* Prevents unwanted horizontal scrolling on narrow screens */
        }

        /* Responsive Top Navigation Header */
        .app-header {
            display: flex;
            align-items: center;
            padding: 16px;
            background-color: #ffffff;
            border-bottom: 1px solid #f0f0f0;
            width: 100%;
        }

        .back-button {
            background: none;
            border: none;
            font-size: 24px;
            color: #0b2265;
            cursor: pointer;
            margin-right: 16px;
            display: flex;
            align-items: center;
            z-index: 10;
        }

        .header-title {
            color: #0b2265;
            font-size: clamp(18px, 5vw, 22px); /* Automatically scales title based on screen width */
            font-weight: bold;
            flex-grow: 1;
            text-align: center;
            margin-right: 40px; 
        }

        /* Fully Responsive Welcome Container */
        .chat-welcome-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            width: 100%;
            max-width: 90%;
            margin: 0 auto;
        }

        .chat-welcome-container h2 {
            color: #0b2265;
            font-size: clamp(20px, 6vw, 26px); /* Fluid typography scales text down safely for tiny phones */
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 16px;
        }

        .chat-welcome-container p {
            color: #556080;
            font-size: clamp(14px, 4.5vw, 16px);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .chat-welcome-container .instruction {
            font-weight: 600;
            color: #000000;
        }

        /* Fine-tuning for ultra-small screens (e.g., older or smaller budget devices) */
        @media (max-width: 360px) {
            .chat-welcome-container {
                padding: 12px;
            }
            .app-header {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- Header Navigation Section -->
    <header class="app-header">
        <button class="back-button" onclick="window.history.back();">←</button>
        <h1 class="header-title">Live Technician Chat</h1>
    </header>

    <!-- Main Dynamic Interface Section -->
    <main class="chat-welcome-container">
        <h2>Welcome to Star Tech Solutions<br>Live Chat</h2>
        <p>Ask any question and get answered immediately.</p>
        <p class="instruction">Click the message icon to chat with us.</p>
    </main>

    <!-- Embed Tidio Chat Script Code Interface -->
 <script src="//code.tidio.co/eydu7mnqfvzdlxbpd7nvlvdvn6aooydi.js" async></script>

    <!-- Dynamic Sizing & Screen-safe Rules for Tidio Widget -->
    <script>
        function onTidioChatApiReady() {
            // Media queries within JS to ensure it stays fully responsive 
            function applyResponsiveTidio() {
                if (window.innerWidth <= 400) {
                    // On very small screens, make it slightly smaller so it doesn't crowd out layout elements
                    window.tidioChatApi.adjustStyles('#tidio { bottom: 35px !important; right: 15px !important; transform: scale(1.15) !important; transform-origin: bottom right !important; }');
                } else {
                    // On standard/larger modern phones, scale it beautifully to 1.25x size
                    window.tidioChatApi.adjustStyles('#tidio { bottom: 45px !important; right: 20px !important; transform: scale(1.25) !important; transform-origin: bottom right !important; }');
                }
            }

            // Execute immediately on load
            applyResponsiveTidio();

            // Re-check dynamically if the device switches orientation (landscape vs portrait)
            window.addEventListener('resize', applyResponsiveTidio);
        }

        if (window.tidioChatApi) {
            window.tidioChatApi.on('ready', onTidioChatApiReady);
        } else {
            document.addEventListener("tidioChat-ready", onTidioChatApiReady);
        }
    </script>

</body>
</html>
