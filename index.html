<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>STS SmartCare Live Chat</title>
    
    <style>
        /* Base page styling to match app layout */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh; /* Keeps text centered vertically on the screen layout */
        }

        /* Welcome text container styling */
        .chat-welcome-container {
            text-align: center;
            padding: 20px;
            max-width: 90%;
            box-sizing: border-box;
        }

        .chat-welcome-container h2 {
            color: #0b2265; /* Deep blue matching your app header */
            font-size: 22px;
            margin-bottom: 12px;
            font-weight: 600;
            line-height: 1.3;
        }

        .chat-welcome-container p {
            color: #4a5568;
            font-size: 16px;
            margin: 6px 0;
            line-height: 1.5;
        }

        .chat-welcome-container .instruction {
            font-weight: 500;
            color: #1a202c;
            margin-top: 18px;
        }
    </style>

    <!-- Tidio chat script integration -->
    <script src="//code.tidio.co/eydu7mnqfvzdlxbpd7nvlvdvn6aooydi.js" async></script>

    <!-- Custom repositioning layout script -->
    <script>
        function onTidioChatApiReady() {
            // Repositions the icon to float on the right edge, vertically centered
            tidioChatApi.adjustStyles('#tidio { bottom: 50% !important; transform: translateY(50%) !important; }');
        }

        if (window.tidioChatApi) {
            window.tidioChatApi.on('ready', onTidioChatApiReady);
        } else {
            document.addEventListener("tidioChat-ready", onTidioChatApiReady);
        }
    </script>
</head>
<body>

    <div class="chat-welcome-container">
        <h2>Welcome to Star Tech Solutions Live Chat</h2>
        <p>Ask any question and get answered immediately.</p>
        <p class="instruction">Click the message icon to chat with us.</p>
    </div>

</body>
</html>
